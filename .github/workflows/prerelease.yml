name: Pre-release

on:
  push:
    branches:
      - "alpha/**"
      - "beta/**"

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      # Beta branches get full validation
      - name: Run tests (beta only)
        if: startsWith(github.ref, 'refs/heads/beta/')
        run: pnpm test
      - name: Run lint (beta only)
        if: startsWith(github.ref, 'refs/heads/beta/')
        run: pnpm lint
      # Publish: changeset pre mode handles the dist-tag automatically
      - name: Publish pre-release
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
