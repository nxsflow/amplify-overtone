name: Canary Checks

on:
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install without lockfile
        run: npm install --no-package-lock
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
