name: Run with E2E Account
description: Runs commands with an E2E test account

inputs:
  run:
    description: Script to run
    required: true
  on_retry_command:
    description: Script to run before a retry (e.g. a cleanup script).
    required: false
  node-version:
    description: Node version used to configure environment with
    required: true
  e2e-test-accounts:
    description: JSON array of test account objects
    required: true
  aws-region:
    description: AWS region. If not provided, a random one will be selected.
    required: false
  attempt-timeout-minutes:
    description: Timeout for each attempt in minutes
    required: false
    default: '25'
  retry-attempts:
    description: Number of retry attempts for the main script
    required: false
    default: '3'
  retry-delay:
    description: Delay between retry attempts in seconds
    required: false
    default: '60'

runs:
  using: composite
  steps:
    - name: Restore Build Cache
      uses: ./.github/actions/restore_build_cache
      with:
        node-version: ${{ inputs.node-version }}

    - name: Select E2E test account
      id: select-account
      uses: ./.github/actions/select_e2e_account
      with:
        e2e-test-accounts: ${{ inputs.e2e-test-accounts }}

    - name: Select AWS region
      id: select-region
      shell: bash
      run: |
        if [ -z "${{ inputs.aws-region }}" ]; then
          regions=("us-west-2" "us-east-1" "ca-central-1" "eu-central-1")
          rand=$[$RANDOM % ${#regions[@]}]
          selected_aws_region=${regions[$rand]}
        else
          selected_aws_region="${{ inputs.aws-region }}"
        fi
        echo "Selected AWS Region is $selected_aws_region"
        echo "selected-aws-region=$selected_aws_region" >> "$GITHUB_OUTPUT"

    - name: Configure test tooling credentials
      uses: ./.github/actions/setup_profile
      with:
        role-to-assume: ${{ steps.select-account.outputs.tooling-role-arn }}
        aws-region: ${{ steps.select-region.outputs.selected-aws-region }}
        profile-name: overtone-e2e

    - name: Configure test execution credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ steps.select-account.outputs.execution-role-arn }}
        aws-region: ${{ steps.select-region.outputs.selected-aws-region }}

    - name: Run script with retry
      shell: bash
      env:
        AWS_REGION: ${{ steps.select-region.outputs.selected-aws-region }}
        E2E_EXECUTION_ROLE_ARN: ${{ steps.select-account.outputs.execution-role-arn }}
      run: |
        set -e

        RETRY_ATTEMPTS=${{ inputs.retry-attempts }}
        RETRY_DELAY=${{ inputs.retry-delay }}
        TIMEOUT_MINUTES=${{ inputs.attempt-timeout-minutes }}
        ATTEMPT=1

        run_with_timeout() {
          local cmd="$1"
          local timeout_seconds=$((TIMEOUT_MINUTES * 60))

          echo "Running command with timeout of $TIMEOUT_MINUTES minutes ($timeout_seconds seconds)"

          local temp_exit_code=$(mktemp)

          (bash -c "$cmd"; echo $? > "$temp_exit_code") &
          local cmd_pid=$!
          local elapsed=0
          local sleep_interval=5

          while [ $elapsed -lt $timeout_seconds ]; do
            if ! kill -0 $cmd_pid 2>/dev/null; then
              wait $cmd_pid 2>/dev/null
              local exit_code
              if [ -f "$temp_exit_code" ]; then
                exit_code=$(cat "$temp_exit_code")
                rm -f "$temp_exit_code"
              else
                exit_code=$?
              fi
              return $exit_code
            fi

            sleep $sleep_interval
            elapsed=$((elapsed + sleep_interval))
          done

          echo "Timeout reached, terminating process..."
          kill -TERM $cmd_pid 2>/dev/null
          sleep 2
          kill -KILL $cmd_pid 2>/dev/null
          wait $cmd_pid 2>/dev/null
          rm -f "$temp_exit_code"
          return 124
        }

        while [ $ATTEMPT -le $RETRY_ATTEMPTS ]; do
          echo "Attempt $ATTEMPT of $RETRY_ATTEMPTS"

          if run_with_timeout '${{ inputs.run }}'; then
            echo "Script succeeded on attempt $ATTEMPT"
            exit 0
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "Script timed out after $TIMEOUT_MINUTES minutes on attempt $ATTEMPT"
            else
              echo "Script failed with exit code $EXIT_CODE on attempt $ATTEMPT"
            fi
          fi

          if [ $ATTEMPT -lt $RETRY_ATTEMPTS ]; then
            echo "Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
            if [ -n "${{ inputs.on_retry_command }}" ]; then
              echo "Running on retry command..."
              if ! run_with_timeout '${{ inputs.on_retry_command }}'; then
                echo "On retry command failed, but continuing with retry attempt"
              fi
            fi
          else
            echo "Script failed after $RETRY_ATTEMPTS attempts"
            exit 1
          fi

          ATTEMPT=$((ATTEMPT + 1))
        done
