version: 1
applications:
    -
        backend:
            phases:
                build:
                    commands:
                         - corepack enable
                         - pnpm install --frozen-lockfile
                         - cd ../.. && pnpm overtone:build
                         - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        frontend:
            phases:
                build:
                    commands: ['next build']
            artifacts:
                baseDirectory: .next
                files:
                    - '**/*'
            cache:
                paths:
                    - '.next/cache/**/*'
                    - '$(pnpm store path)'
            buildPath: packages/email-site
        appRoot: packages/email-site
