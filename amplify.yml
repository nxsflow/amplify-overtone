version: 1
backend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - cd $CODEBUILD_SRC_DIR && pnpm install --frozen-lockfile
    build:
      commands:
        - cd $CODEBUILD_SRC_DIR && pnpm overtone:build
        - cd $CODEBUILD_SRC_DIR && pnpm --filter @nxsflow/email-site exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - cd $CODEBUILD_SRC_DIR && pnpm install --frozen-lockfile
    build:
      commands:
        - cd $CODEBUILD_SRC_DIR && pnpm overtone:build
        - cd $CODEBUILD_SRC_DIR && pnpm email-site:build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
