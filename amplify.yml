version: 1
backend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - pnpm email-site:build
  artifacts:
    baseDirectory: packages/email-site/.next
    files:
      - "**/*"
  cache:
    paths:
      - $(pnpm store path)