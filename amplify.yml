version: 1
backend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
        - pnpm overtone:build
    build:
      commands:
        - pnpm email-site:deploy
frontend:
  phases:
    build:
      commands:
        - pnpm email-site:build
  artifacts:
    baseDirectory: packages/email-site/.next
    files:
      - "**/*"
  cache:
    paths:
      - $(pnpm store path)
      - packages/email-site/.next/cache/**/*
