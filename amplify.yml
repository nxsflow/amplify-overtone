version: 1
appRoot: packages/email-site
backend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - corepack enable
        - corepack prepare pnpm@latest --activateactivate
        - cd ../..
        - pnpm install --frozen-lockfile
        - pwd
        - pnpm overtone:build
    build:
      commands:
        - pnpm email-site:deploy
frontend:
  phases:
    build:
      commands:
        - pwd
        - pnpm email-site:build
        - ls packages/email-site/.next
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - $(pnpm store path)
      - .next/cache/**/*